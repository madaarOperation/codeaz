name: Test Codeaz Action
on:
  push:
    branches: [main]
permissions: write-all
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the codebase
      - name: checkout codebase
        uses: actions/checkout@v4
      # 2. Test codeaz action
      - name: test codeaz action
        uses: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          code-owner: vp=hassan,tl=negam,dvr=ali
          # If this action needs to update workflow files, provide a PAT
          # with repo + workflow scopes instead of relying on GITHUB_TOKEN.
          # github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
