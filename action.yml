name: Codeaz
description: Codeaz is a github action to build role base system over github repo
inputs:
  code-owner:
    description: github users allow to push to repo
    required: true
    default: ""
  github-token:
    description: GitHub token used to reset unauthorized changes and enforce code owner rules
    required: false
    default: ""
  token:
    description: optional legacy alias for github-token
    required: false
    default: ""
outputs:
  time:
    description: The Time Code Merge Happen
runs:
  using: node24
  main: dist/index.js
