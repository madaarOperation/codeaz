name: Codeaz
description: Codeaz is a github action to build role base system over github repo
inputs:
  code-owner:
    description: github users allow to push to repo
    required: true
    default: ""
  github-token:
    description: GitHub token used to reset unauthorized changes and enforce code owner rules. For workflow file rollback, use a PAT with repo + workflows permissions; do not pass the default GITHUB_TOKEN.
    required: false
    default: ""
  token:
    description: optional legacy alias for github-token
    required: false
    default: ""
outputs:
  time:
    description: The Time Code Merge Happen
runs:
  using: node24
  main: dist/index.js
