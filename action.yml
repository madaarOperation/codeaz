# Project: Codeaz
# ===================================================  #
name: Codeaz
description: Codeaz is a github action to build role base system over github repo
inputs:
  code-owner:
    description: github users allow to push to repo
    required: true
    default: ""
  github-token:
    description: GitHub token used to reset unauthorized changes and enforce code owner rules
    required: false
    default: ""
  token:
    description: optional legacy alias for github-token
    required: false
    default: ""
outputs:
  time:
    description: The timestamp when the code merge/check occurred
  runner_name:
    description: The GitHub username of the action runner
  status:
    description: Status of the codeowner check ("authorized" if user is allowed, "reset" if unauthorized and reset was performed)
runs:
  using: node24
  main: dist/index.js
